{% extends "layout.html" %}
{% block title %}Register Student | Smart Attendance{% endblock %}
{% block content %}
<section class="grid-two mt-4">
    <div class="panel form-panel">
        <h2>Register New Student</h2>
        <form method="post" enctype="multipart/form-data" class="stack">
            <label for="student_name">Student Name</label>
            <input id="student_name" name="student_name" class="form-control" required>
            <label for="photo">Student Photo</label>
            <input id="photo" name="photo" type="file" class="form-control" accept=".jpg,.jpeg,.png" required>
            <button type="submit" class="btn btn-primary">Register Student</button>
        </form>
    </div>

    <div class="panel">
        <h2>Existing Students</h2>
        {% if students %}
        <div class="student-grid">
            {% for student in students %}
            <div class="student-item">{{ student }}</div>
            {% endfor %}
        </div>
        {% else %}
        <p class="empty-state">No students registered yet.</p>
        {% endif %}
    </div>
</section>
{% endblock %}
